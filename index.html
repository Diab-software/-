<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓐𝓼𝓶𝓪𝓪 ✧ 𝓜𝓸𝓱𝓪𝓶𝓶𝓪𝓭 ✧ - موقع حب خارق</title>
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إعادة تعيين وضبط عام */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            overflow-x: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        /* تأثير الخلفية المتحركة ثلاثية الأبعاد */
        .bg-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            overflow: hidden;
        }
        
        .bg-effect span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 105, 180, 0.1);
            border-radius: 50%;
            animation: moveBackground 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes moveBackground {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        /* تأثير الجسيمات المتلألئة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -4;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            animation: twinkleParticle 3s infinite alternate;
        }
        
        @keyframes twinkleParticle {
            0% { opacity: 0.1; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }
        
        /* شاشة البداية الخارقة */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e, #0a0a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1.5s ease;
        }
        
        .splash-content {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 70px;
            box-shadow: 0 0 100px #ff69b4, 0 0 200px #ff1493;
            border: 2px solid rgba(255, 182, 193, 0.5);
            animation: superGlow 2s infinite alternate;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(5deg);
        }
        
        @keyframes superGlow {
            0% { box-shadow: 0 0 100px #ff69b4, 0 0 200px #ff1493; transform: perspective(1000px) rotateX(5deg) scale(1); }
            100% { box-shadow: 0 0 150px #ff1493, 0 0 250px #ff69b4; transform: perspective(1000px) rotateX(5deg) scale(1.02); }
        }
        
        .splash-title {
            font-family: 'Dancing Script', cursive;
            font-size: 6rem;
            background: linear-gradient(45deg, #ffccd5, #d0b0ff, #ffb0d9, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px #ff69b4, 0 0 100px #ff1493;
            margin-bottom: 30px;
            animation: textGlitch 3s infinite;
        }
        
        @keyframes textGlitch {
            0%, 100% { transform: skew(0deg); }
            95% { transform: skew(2deg); }
            96% { transform: skew(-2deg); }
            97% { transform: skew(1deg); }
        }
        
        .enter-button {
            background: linear-gradient(45deg, #ff69b4, #d056c5, #b0309e, #8a2be2);
            border: none;
            padding: 25px 60px;
            border-radius: 80px;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 50px #ff69b4, 0 0 100px #ff1493;
            animation: superPulse 1.5s infinite;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }
        
        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }
        
        @keyframes superPulse {
            0% { transform: scale(1); box-shadow: 0 0 50px #ff69b4, 0 0 100px #ff1493; }
            50% { transform: scale(1.1); box-shadow: 0 0 80px #ff1493, 0 0 150px #ff69b4; }
        }
        
        .enter-button:hover {
            transform: scale(1.15);
            box-shadow: 0 0 100px #ff1493, 0 0 200px #ff69b4;
        }
        
        /* رأس الموقع ثلاثي الأبعاد */
        .header {
            text-align: center;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            background: rgba(10, 5, 20, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            box-shadow: 0 0 70px #ff69b4, 0 0 140px #ff1493;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 182, 193, 0.5);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            animation: headerFloat 6s infinite ease-in-out;
        }
        
        @keyframes headerFloat {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }
        
        .header::before {
            content: "❤️🌹💌";
            position: absolute;
            bottom: -30px;
            right: -30px;
            font-size: 12rem;
            opacity: 0.1;
            transform: rotate(15deg);
            animation: spinSlow 30s linear infinite;
        }
        
        @keyframes spinSlow {
            from { transform: rotate(15deg); }
            to { transform: rotate(375deg); }
        }
        
        h1 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            font-size: 3.5rem;
        }
        
        .fancy-names {
            font-size: 4rem;
            background: linear-gradient(45deg, #ffccd5, #d0b0ff, #ffb0d9, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
            animation: nameGlow 3s infinite alternate;
        }
        
        @keyframes nameGlow {
            from { text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493; }
            to { text-shadow: 0 0 50px #ff1493, 0 0 100px #ff69b4; }
        }
        
        /* القلب النابض فائق */
        .heart-container {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
            animation: superHeartbeat 1s infinite;
        }
        
        .heart {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #ff69b4;
            transform: rotate(45deg);
            box-shadow: 0 0 70px #ff69b4, 0 0 140px #ff1493;
        }
        
        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background: #ff69b4;
            border-radius: 50%;
            box-shadow: 0 0 70px #ff69b4;
        }
        
        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: -50px; }
        
        @keyframes superHeartbeat {
            0% { transform: rotate(45deg) scale(1); }
            25% { transform: rotate(45deg) scale(1.2); }
            50% { transform: rotate(45deg) scale(1); }
            75% { transform: rotate(45deg) scale(1.1); }
        }
        
        /* التاريخ الخاص */
        .special-date {
            background: linear-gradient(45deg, #ff69b4, #d056c5, #b0309e);
            padding: 15px 35px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 20px;
            font-size: 1.8rem;
            box-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
            animation: dateGlow 2s infinite alternate;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        @keyframes dateGlow {
            from { box-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493; }
            to { box-shadow: 0 0 50px #ff1493, 0 0 100px #ff69b4; }
        }
        
        /* أقسام الذكرى والاقتباس مع تأثيرات خارقة */
        .memory-section, .quote-section {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 40px;
            margin: 25px 0;
            text-align: center;
            box-shadow: 0 0 70px #ff69b4, 0 0 140px #ff1493;
            border: 2px solid rgba(255, 182, 193, 0.5);
            position: relative;
            overflow: hidden;
            transition: 0.5s;
        }
        
        .memory-section:hover, .quote-section:hover {
            transform: scale(1.02);
            box-shadow: 0 0 100px #ff1493, 0 0 200px #ff69b4;
        }
        
        .memory-section i, .quote-section i {
            font-size: 5rem;
            color: #ff69b4;
            margin-bottom: 15px;
            animation: superFloat 3s infinite;
            filter: drop-shadow(0 0 20px #ff69b4);
        }
        
        @keyframes superFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            75% { transform: translateY(-5px) rotate(-5deg); }
        }
        
        .quote-content {
            font-size: 2.5rem;
            font-style: italic;
            color: #d0b0ff;
            font-family: 'Dancing Script', cursive;
            line-height: 1.8;
            text-shadow: 0 0 20px #ff69b4;
            animation: quotePulse 4s infinite;
        }
        
        @keyframes quotePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; text-shadow: 0 0 30px #ff69b4; }
        }
        
        /* رسائل الحب بتأثير بطاقات سحرية */
        .messages-container {
            width: 100%;
            max-width: 1000px;
        }
        
        .message-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 30px;
            margin: 25px 0;
            border: 2px solid rgba(255, 182, 193, 0.5);
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.5);
            transition: 0.5s;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: center;
        }
        
        @keyframes cardAppear {
            from { transform: scale(0.5) rotateY(90deg); opacity: 0; }
            to { transform: scale(1) rotateY(0); opacity: 1; }
        }
        
        .message-card::before {
            content: "💕💖💗";
            position: absolute;
            bottom: -30px;
            right: -30px;
            font-size: 8rem;
            opacity: 0.1;
            transform: rotate(15deg);
            animation: spinSlow 40s linear infinite;
        }
        
        .message-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,105,180,0.2), transparent 70%);
            pointer-events: none;
        }
        
        .message-card:hover {
            transform: scale(1.03) translateY(-10px);
            box-shadow: 0 0 70px #ff69b4, 0 0 140px #ff1493;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .message-date {
            color: #ffb0d9;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #ff69b4;
        }
        
        .message-actions button {
            background: none;
            border: none;
            color: #ffb0d9;
            font-size: 1.5rem;
            margin: 0 8px;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px #ff69b4);
        }
        
        .message-actions button:hover { 
            color: #ff69b4; 
            transform: scale(1.3) rotate(10deg);
            filter: drop-shadow(0 0 20px #ff1493);
        }
        
        .message-content {
            font-size: 1.8rem;
            line-height: 1.8;
            white-space: pre-wrap;
            font-style: italic;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        /* إضافة رسالة بتأثير سحري */
        .add-message-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(10, 5, 20, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 50px;
            margin: 40px 0;
            box-shadow: 0 0 80px #ff69b4, 0 0 160px #ff1493;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 182, 193, 0.5);
        }
        
        .add-message-container i.fa-envelope {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 8rem;
            opacity: 0.1;
            color: #ff69b4;
            transform: rotate(-15deg);
            animation: spinSlow 30s linear infinite;
        }
        
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid #ff69b4;
            border-radius: 50px;
            padding: 25px;
            color: white;
            font-size: 1.5rem;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 25px;
            transition: 0.5s;
            box-shadow: 0 0 30px #ff69b4;
        }
        
        textarea:focus {
            outline: none;
            border-color: #ff1493;
            box-shadow: 0 0 60px #ff69b4, 0 0 120px #ff1493;
            transform: scale(1.02);
        }
        
        button {
            background: linear-gradient(45deg, #ff69b4, #d056c5, #b0309e, #8a2be2);
            border: none;
            padding: 20px 50px;
            border-radius: 80px;
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 0 40px #ff69b4, 0 0 80px #ff1493;
            transition: 0.5s;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shine 4s infinite;
        }
        
        button:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 0 70px #ff1493, 0 0 140px #ff69b4;
        }
        
        /* صندوق الهدية السحري */
        .gift-box {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff69b4, #b0309e, #8a2be2);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 60px #ff69b4, 0 0 120px #ff1493;
            animation: superFloat 3s infinite, rotateBox 10s infinite;
            z-index: 100;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        @keyframes rotateBox {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        
        .gift-box i { 
            font-size: 4rem; 
            color: white;
            filter: drop-shadow(0 0 20px white);
            animation: giftShine 2s infinite;
        }
        
        @keyframes giftShine {
            0%, 100% { filter: drop-shadow(0 0 20px white); }
            50% { filter: drop-shadow(0 0 40px #ff69b4); }
        }
        
        .gift-box:hover {
            transform: scale(1.2) rotate(10deg);
            box-shadow: 0 0 100px #ff1493, 0 0 200px #ff69b4;
        }
        
        /* النوافذ المنبثقة الخارقة */
        .gift-modal, .letter-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(20px);
        }
        
        .gift-modal.active, .letter-modal.active { 
            display: flex;
            animation: modalAppear 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.3) rotateY(180deg); }
            to { opacity: 1; transform: scale(1) rotateY(0); }
        }
        
        .gift-content, .letter-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 60px;
            border-radius: 80px;
            text-align: center;
            max-width: 700px;
            width: 90%;
            border: 3px solid #ff69b4;
            box-shadow: 0 0 150px #ff69b4, 0 0 300px #ff1493;
            animation: contentPulse 2s infinite;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes contentPulse {
            0%, 100% { box-shadow: 0 0 150px #ff69b4, 0 0 300px #ff1493; }
            50% { box-shadow: 0 0 200px #ff1493, 0 0 400px #ff69b4; }
        }
        
        .gift-content i, .letter-content i {
            font-size: 7rem;
            color: #ff69b4;
            margin: 20px;
            filter: drop-shadow(0 0 30px #ff69b4);
            animation: iconSpin 10s infinite;
        }
        
        @keyframes iconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .letter-content {
            background: #fff9f0;
            color: #5a3e36;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #fff9f0, #ffe4e1);
        }
        
        .close-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: none;
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px white);
        }
        
        .close-btn:hover {
            transform: rotate(90deg) scale(1.2);
            color: #ff69b4;
        }
        
        .letter-content .close-btn { color: #5a3e36; }
        
        /* العناصر المتحركة الخارقة */
        .floating-heart {
            position: fixed;
            font-size: 3rem;
            color: #ff69b4;
            pointer-events: none;
            z-index: 50;
            animation: superFloatUp 8s linear forwards;
            filter: drop-shadow(0 0 20px #ff69b4);
        }
        
        @keyframes superFloatUp {
            0% { transform: translateY(100vh) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.2) rotate(720deg); opacity: 0; }
        }
        
        .floating-rose {
            position: fixed;
            font-size: 3rem;
            color: #ff1493;
            pointer-events: none;
            z-index: 45;
            animation: superFloatUp 10s linear forwards;
            filter: drop-shadow(0 0 20px #ff1493);
        }
        
        .floating-star {
            position: fixed;
            font-size: 2rem;
            color: gold;
            pointer-events: none;
            z-index: 40;
            animation: superFloatUp 12s linear forwards;
            filter: drop-shadow(0 0 20px gold);
        }
        
        .bubble {
            position: absolute;
            font-size: 2.2rem;
            color: #ff69b4;
            text-shadow: 0 0 20px white, 0 0 40px #ff69b4;
            pointer-events: none;
            animation: superBubbleRise 4s forwards;
            z-index: 2000;
            font-family: 'Dancing Script', cursive;
            font-weight: bold;
        }
        
        @keyframes superBubbleRise {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-75px) scale(1.3) rotate(10deg); opacity: 0.9; }
            100% { transform: translateY(-200px) scale(0.8) rotate(-10deg); opacity: 0; }
        }
        
        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background: #ff69b4;
            border-radius: 50%;
            animation: superConfettiFall 5s linear forwards;
            z-index: 1500;
        }
        
        @keyframes superConfettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(1080deg); opacity: 0; }
        }
        
        .rainbow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: rainbow 18s ease infinite;
            z-index: 5000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        .rainbow.active {
            opacity: 0.3;
        }
        
        @keyframes rainbow { 
            0%{background-position:0% 82%}
            50%{background-position:100% 19%}
            100%{background-position:0% 82%}
        }
        
        /* عداد ومشغل سحري */
        .love-count, .music-player {
            position: fixed;
            top: 20px;
            background: rgba(255,255,255,0.15);
            padding: 15px 25px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,182,193,0.5);
            box-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
            z-index: 100;
            font-size: 1.2rem;
            animation: countPulse 2s infinite;
        }
        
        @keyframes countPulse {
