<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓐𝓼𝓶𝓪𝓪 ✧ 𝓜𝓸𝓱𝓪𝓶𝓶𝓪𝓭 ✧ - رسائل حب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: default;
        }
        
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1.5s ease;
        }
        
        .splash-content {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.5);
            border: 1px solid rgba(255, 182, 193, 0.3);
            animation: fadeIn 1.5s ease-out;
        }
        
        .splash-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #ffccd5;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
        }
        
        .splash-subtitle {
            font-size: 1.5rem;
            color: #d0b0ff;
            margin-bottom: 30px;
        }
        
        .enter-button {
            background: linear-gradient(45deg, #ff69b4, #d056c5);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.7);
            animation: pulse 2s infinite;
        }
        
        .enter-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 105, 180, 1);
        }
        
        .header {
            text-align: center;
            padding: 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            background: rgba(10, 5, 20, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
            border: 1px solid rgba(255, 182, 193, 0.3);
            animation: fadeIn 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 105, 180, 0.2), transparent 70%);
            z-index: -1;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #ffccd5;
            text-shadow: 0 0 25px rgba(255, 105, 180, 0.9);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            animation: float 3s infinite ease-in-out;
        }
        
        .fancy-names {
            font-size: 3rem;
            background: linear-gradient(45deg, #ffccd5, #d0b0ff, #ffb0d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.7);
            display: inline-block;
            padding: 0 10px;
        }
        
        .heart-container {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: heartbeat 1.2s infinite;
        }
        
        .heart {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #ff69b4;
            transform: rotate(45deg);
            box-shadow: 0 0 30px rgba(255, 105, 180, 1);
        }
        
        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 60px;
            height: 60px;
            background: #ff69b4;
            border-radius: 50%;
        }
        
        .heart::before {
            top: -30px;
            left: 0;
        }
        
        .heart::after {
            top: 0;
            left: -30px;
        }
        
        .date-display {
            font-size: 1.5rem;
            color: #d0b0ff;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        .special-date {
            background: linear-gradient(45deg, #ff69b4, #d056c5);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.3rem;
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.7);
        }
        
        /* الرسائل اليومية */
        .messages-container {
            width: 100%;
            max-width: 800px;
            margin: 20px 0;
        }
        
        .message-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 182, 193, 0.4);
        }
        
        .message-card::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff69b4, #d056c5);
            transform: translateY(-100%);
            transition: transform 0.5s ease;
        }
        
        .message-card:hover {
            transform: translateY(-10px) rotate(1deg);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.6);
        }
        
        .message-card:hover::before {
            transform: translateY(0);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .message-date {
            font-size: 1.2rem;
            color: #ffb0d9;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .message-actions {
            display: flex;
            gap: 15px;
        }
        
        .edit-btn, .delete-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
        }
        
        .edit-btn:hover {
            background: rgba(0, 200, 255, 0.4);
            transform: scale(1.1);
        }
        
        .delete-btn:hover {
            background: rgba(255, 80, 80, 0.4);
            transform: scale(1.1);
        }
        
        .message-content {
            font-size: 1.5rem;
            line-height: 1.8;
            font-style: italic;
            position: relative;
            padding: 20px 0 0 30px;
            white-space: pre-wrap;
        }
        
        .message-content::before {
            content: """;
            position: absolute;
            top: -20px;
            right: 0;
            font-size: 6rem;
            color: rgba(255, 105, 180, 0.3);
            font-family: 'Playfair Display', serif;
        }
        
        .edit-container {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        
        .edit-textarea {
            width: 100%;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 182, 193, 0.4);
            border-radius: 20px;
            padding: 20px;
            color: white;
            font-size: 1.3rem;
            font-family: 'Cairo', sans-serif;
            resize: vertical;
        }
        
        .edit-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }
        
        .save-btn, .cancel-btn {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .save-btn {
            background: linear-gradient(45deg, #4CAF50, #2E7D32);
            color: white;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        }
        
        .save-btn:hover {
            transform: scale(1.05);
        }
        
        .cancel-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        
        .add-message-container {
            width: 100%;
            max-width: 800px;
            background: rgba(10, 5, 20, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            margin-top: 30px;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.6);
            border: 1px solid rgba(255, 182, 193, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .add-message-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 105, 180, 0.25), transparent 70%);
            z-index: -1;
        }
        
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 182, 193, 0.4);
            border-radius: 25px;
            padding: 20px;
            color: white;
            font-size: 1.3rem;
            font-family: 'Cairo', sans-serif;
            resize: vertical;
            margin-bottom: 25px;
            transition: all 0.5s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #ff69b4;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
        }
        
        button {
            background: linear-gradient(45deg, #ff69b4, #d056c5);
            border: none;
            padding: 18px 35px;
            border-radius: 60px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.7);
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.8s;
        }
        
        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.9);
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        /* عناصر التزيين */
        .moon {
            position: fixed;
            top: 5%;
            left: 10%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #f9f3e9, #d8d0c5);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(249, 243, 233, 0.8);
            z-index: -1;
            animation: driftMoon 90s ease-in-out infinite;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        
        .petal {
            position: absolute;
            background-size: cover;
            opacity: 0.8;
            animation: fall linear forwards;
        }
        
        .bubble {
            position: absolute;
            color: #ff69b4;
            font-size: 1.6rem;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            animation: bubbleRise 3s forwards;
            z-index: 1000;
            font-family: 'Dancing Script', cursive;
        }
        
        .love-count {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 18px;
            border-radius: 25px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            border: 1px solid rgba(255, 182, 193, 0.3);
            z-index: 10;
        }
        
        .music-player {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 18px;
            border-radius: 25px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            border: 1px solid rgba(255, 182, 193, 0.3);
            cursor: pointer;
            transition: all 0.5s ease;
            z-index: 10;
        }
        
        .music-player:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        /* الرسوم المتحركة */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes heartbeat {
            0% { 
                transform: rotate(45deg) scale(1); 
                box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            }
            50% { 
                transform: rotate(45deg) scale(1.1); 
                box-shadow: 0 0 40px rgba(255, 105, 180, 1);
            }
            100% { 
                transform: rotate(45deg) scale(1); 
                box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            }
        }
        
        @keyframes driftMoon {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, 25px); }
            50% { transform: translate(0, 50px); }
            75% { transform: translate(-20px, 25px); }
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        @keyframes bubbleRise {
            0% {
                transform: translate(-50%, 0) scale(0.6);
                opacity: 0.9;
            }
            70% {
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -120px) scale(1.3);
                opacity: 0;
            }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 105, 180, 0.7); }
            50% { transform: scale(1.07); box-shadow: 0 0 40px rgba(255, 105, 180, 1); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 105, 180, 0.7); }
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0); }
        }
        
        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        
        footer {
            margin-top: 40px;
            text-align: center;
            padding: 25px;
            color: #a0a0d0;
            font-size: 1.1rem;
            width: 100%;
            max-width: 800px;
            background: rgba(10, 5, 20, 0.4);
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .fancy-names { font-size: 2.5rem; }
            .splash-title { font-size: 3rem; }
            .message-content { font-size: 1.3rem; }
            textarea { height: 150px; font-size: 1.2rem; }
            button { padding: 15px 30px; font-size: 1.2rem; }
            .love-count, .music-player { top: 15px; font-size: 1rem; }
        }
        
        .quote-section {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 35px;
            margin: 30px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 182, 193, 0.4);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
        }
        
        .quote-section::before {
            content: "";
            position: absolute;
            top:
